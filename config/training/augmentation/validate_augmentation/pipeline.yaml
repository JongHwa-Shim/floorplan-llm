# 증강 검증 스크립트 설정
# scripts/augmentation/validate_augmentation.py에서 사용한다.
# augmentation 설정은 pipeline.yaml을 단일 출처로 사용하며,
# validate_augmentation.py가 실행 시 pipeline.yaml을 별도로 로드한다.

hydra:
  run:
    dir: outputs/training/augmentation/${now:%Y-%m-%d}/${now:%H-%M-%S}

model:
  user: "Qwen"                  # HuggingFace Hub 사용자(조직)명
  name: "Qwen2.5-Coder-7B"     # 모델명 (로컬 저장 디렉토리명으로도 사용)
  hub_id: "${model.user}/${model.name}"              # HuggingFace Hub 전체 경로 (자동 파생)
  tokenizer_dir: "data/models/${model.name}/tokenization"       # 확장 토크나이저 경로 (자동 파생)
  vocab_extension: "${model.tokenizer_dir}/vocab_extension.json" # vocab 확장 정보 경로 (자동 파생)

data:
  arrow_dir: "data/dataset/processed_dataset/rplan/arrow"
  split: "train"                          # 사용할 split (train | validation | test)
  aug_pipeline_config: "config/training/augmentation/validate_augmentation/augmentation.yaml"  # 증강 설정 경로

validate:
  num_samples: 20         # 검증할 샘플 수
  seed: 42                # 샘플 선택 시드
  augment_per_sample: 3   # 샘플 1개당 서로 다른 증강 결과 출력 횟수
  output_file: "samples.txt"
