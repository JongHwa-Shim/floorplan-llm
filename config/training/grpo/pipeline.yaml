# GRPO(Group Relative Policy Optimization) 훈련 파이프라인 설정
# GDPO(보상별 독립 정규화) + 토큰 수준 신용할당 + Rule-based RLVR
# Mod Record: 이전 구조에서는 sft/final/model.safetensors(merged full model)를 로컬에서 로드했음.
# 새 구조: HF Hub NF4 base + partial_state.pt + SFT adapter(frozen) + GRPO adapter(trainable)로 구성.

model:
  user: "Qwen"
  name: "Qwen2.5-Coder-7B"
  hub_id: "${model.user}/${model.name}"                                         # HF Hub 전체 경로
  pre_stage_dir: "data/models/${model.name}/checkpoints/pre_stage/final"        # partial_state.pt 위치
  sft_adapter_dir: "data/models/${model.name}/checkpoints/sft/final"            # SFT adapter 위치 (frozen)
  tokenizer_dir: "data/models/${model.name}/tokenization"                       # 확장 토크나이저 경로
  vocab_extension: "${model.tokenizer_dir}/vocab_extension.json"

quantization:
  load_in_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: false

# LoRA(Low-Rank Adaptation) 설정 (GRPO adapter)
# Mod Record: DoRA → 표준 LoRA 전환 (DoRA unmerged inference O(d²) 병목 제거)
lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  # Qwen2.5 attention + MLP 전 레이어 대상
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"

data:
  arrow_dir: "data/dataset/processed_dataset/rplan/arrow"
  # 프롬프트 생성용 증강 (입력 조건만 증강, 출력은 모델이 생성)
  aug_pipeline_config: "config/training/augmentation/sft.yaml"
  max_prompt_length: 2048
  max_completion_length: 2048

distributed:
  # 사용할 GPU 수. 1이면 단일 GPU 모드, 2 이상이면 torchrun DDP로 자동 전환
  nproc_per_node: 2

resume:
  enabled: false
  checkpoint_path: null
  auto_find_latest: true

training:
  output_dir: "data/models/${model.name}/checkpoints/grpo"
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-6
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  bf16: true
  logging_steps: 5
  save_strategy: "steps"
  save_steps: 100
  report_to: "wandb"
  project_name: "floorplan-llm"
  run_name: "floorplan-grpo"
  seed: 42
  save_total_limit: 3
  # optimizer: paged_adamw_32bit는 momentum/variance를 CPU RAM으로 페이징해 GPU OOM 방지
  optim: "paged_adamw_32bit"
  max_steps: 0                          # 0 = 전체 epoch 기반

# GRPO 생성 설정
grpo:
  num_generations: 4                    # 프롬프트당 생성 개수 (G)
  temperature: 0.7
  top_p: 0.95
  kl_coeff: 0.05                        # KL 페널티 계수 (beta)
  clip_range: 0.2                       # PPO 클리핑 엡실론
  num_iterations: 2                     # roll-out 재활용 횟수

# 보상함수 설정
# weight: 보상 가중합 계수 (GDPO 정규화 후 적용)
# credit_assignment: true면 토큰별 차등 어드밴티지 적용
# penalty_scale: 오류 토큰에 가할 추가 페널티 배율
rewards:
  format:
    enabled: true
    weight: 1.0
    hard_gate: true                     # R_format=0이면 모든 보상=0
    credit_assignment: true
    penalty_scale: 2.0

  count_total:
    enabled: true
    weight: 0.5
    credit_assignment: false

  count_type:
    enabled: true
    weight: 1.0
    credit_assignment: false

  orthogonality:
    enabled: true
    weight: 1.5
    credit_assignment: true
    penalty_scale: 1.5

  no_overlap:
    enabled: true
    weight: 2.0
    credit_assignment: true
    penalty_scale: 2.0

  connectivity:
    enabled: true
    weight: 1.0
    credit_assignment: false

  spatial:
    enabled: true
    weight: 0.5
    credit_assignment: false

# GDPO + 토큰 신용할당 어드밴티지 계산 설정
advantage:
  eps: 1.0e-8                           # 수치 안정성 엡실론
