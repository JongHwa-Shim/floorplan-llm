# SFT(Supervised Fine-Tuning) 훈련 파이프라인 설정
# Mod Record: 이전 구조에서는 pre_stage/final/model.safetensors를 로컬에서 직접 로드했음.
# 새 구조에서는 HF Hub에서 NF4 base model을 로드하고 partial_state.pt를 주입하여
# 전체 모델 저장 비용 없이 커스텀 토큰 가중치를 복원한다.

model:
  user: "Qwen"
  name: "Qwen2.5-Coder-7B"
  hub_id: "${model.user}/${model.name}"                                         # HF Hub 전체 경로
  pre_stage_dir: "data/models/final_checkpoints/${model.name}/pre_stage/final"        # partial_state.pt 위치
  tokenizer_dir: "data/models/${model.name}/tokenization"                       # 확장 토크나이저 경로
  vocab_extension: "${model.tokenizer_dir}/vocab_extension.json"

quantization:
  load_in_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: false

# LoRA(Low-Rank Adaptation) 설정
# Mod Record: DoRA(use_dora=True)에서 전환. DoRA는 unmerged inference 시 O(d²) delta_W
# materialization이 발생해 generation 속도가 ~240× 저하됨. 표준 LoRA는 O(r×d) efficient path 사용.
lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  # Qwen2.5 attention + MLP 전 레이어 대상
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"

data:
  arrow_dir: "data/dataset/processed_dataset/rplan/arrow"
  max_length: 4096
  aug_pipeline_config: "config/training/augmentation/sft.yaml"

distributed:
  # 사용할 GPU 수. 1이면 단일 GPU 모드, 2 이상이면 torchrun DDP로 자동 전환
  nproc_per_node: 1

resume:
  enabled: false
  checkpoint_path: null
  auto_find_latest: true

training:
  output_dir: "data/models/${model.name}/checkpoints/sft"
  num_train_epochs: 3
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 1      # GPU 2대 DDP: 실효배치 = GPU 개수 × batch 개수 × accum 개수
  learning_rate: 2.0e-4               # QLoRA 및 QDoRA는 full fine-tuning보다 높은 LR 사용 권장
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.01
  bf16: true
  dataloader_num_workers: 4
  save_strategy: "epoch"
  eval_strategy: "epoch"
  logging_steps: 10
  report_to: "wandb"
  project_name: "floorplan-llm"
  run_name: "floorplan-sft"
  seed: 42
  save_total_limit: 3
  load_best_model_at_end: true
  # optimizer: paged_adamw_32bit는 momentum/variance를 CPU RAM으로 페이징해 GPU OOM 방지
  optim: "paged_adamw_32bit"
  max_steps: 0                        # 0 = 전체 epoch 기반 학습
