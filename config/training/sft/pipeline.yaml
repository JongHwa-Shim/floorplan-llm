# SFT(Supervised Fine-Tuning) 훈련 파이프라인 설정
# Pre-Stage에서 워밍업된 모델을 입력으로 LoRA를 적용한 전체 레이어 fine-tuning.
# 모델 로드: HF Hub base model + final_checkpoints/pre_stage/partial_state.pt 적용.

model:
  user: "Qwen"
  name: "Qwen2.5-Coder-7B"
  hub_id: "${model.user}/${model.name}"  # HF Hub에서 base model 로드에 사용
  # partial_state.pt 위치: 훈련 결과를 직접 관리하는 final_checkpoints/ 사용
  # (checkpoints/pre_stage/final/은 훈련 반복 시 덮어씌워질 수 있음)
  model_dir: "data/models/${model.name}/final_checkpoints/pre_stage"
  # 토크나이저는 훈련 단계와 무관하게 공통 tokenization/ 경로에서 로드
  tokenizer_dir: "data/models/${model.name}/tokenization"
  vocab_extension: "${model.tokenizer_dir}/vocab_extension.json"

quantization:
  load_in_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: false

# LoRA(Low-Rank Adaptation) 설정
lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  # Qwen2.5 attention + MLP 전 레이어 대상
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"

data:
  arrow_dir: "data/dataset/processed_dataset/rplan/arrow"
  max_length: 4096
  aug_pipeline_config: "config/training/augmentation/sft.yaml"

distributed:
  # 사용할 GPU 수. 1이면 단일 GPU 모드, 2 이상이면 torchrun DDP로 자동 전환
  nproc_per_node: 1

resume:
  enabled: false
  checkpoint_path: null
  auto_find_latest: true

training:
  num_train_epochs: 3
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 1      # GPU 2대 DDP: 실효배치 = GPU 개수 × batch 개수 × accum 개수
  learning_rate: 2.0e-4               # QLoRA는 full fine-tuning보다 높은 LR 사용 권장
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.01
  bf16: true
  dataloader_num_workers: 4
  save_strategy: "epoch"
  eval_strategy: "epoch"
  logging_steps: 10
  report_to: "wandb"
  project_name: "floorplan-llm"
  run_name: "floorplan-sft"
  seed: 42
  save_total_limit: 3
  load_best_model_at_end: true
  max_steps: 0                        # 0 = 전체 epoch 기반 학습
  output_dir: "data/models/${model.name}/checkpoints/${training.run_name}/sft"
